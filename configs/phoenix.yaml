# PhoenixFrame 配置文件

app_name: PhoenixFrame
version: 3.2.0

# 环境配置
environments:
  default:
    base_url: "http://localhost:8000"
    description: "默认环境"
  
  development:
    base_url: "http://dev.example.com"
    description: "开发环境"
  
  staging:
    base_url: "http://staging.example.com"
    description: "预发布环境"
  
  production:
    base_url: "https://example.com"
    description: "生产环境"

# 报告配置
reporting:
  # Allure报告配置
  allure:
    enabled: true
    report_dir: "allure-report"
    results_dir: "allure-results"
  
  # PhoenixFrame原生报告配置
  native:
    enabled: true
    output_dir: "reports"
    formats: ["html", "json"]
    auto_open: false
    template_dir: null
  
  # 报告收集器配置
  collector:
    auto_screenshot: true
    collect_logs: true
    collect_metrics: true
    max_log_entries: 1000
    screenshot_on_failure: true
  
  # 报告内容配置
  content:
    include_environment: true
    include_config: true
    include_screenshots: true
    include_logs: true
    include_metrics: true
    include_timeline: true
  
  # 报告分发配置
  distribution:
    email:
      enabled: false
      recipients: []
      smtp_server: ""
      smtp_port: 587
      username: ""
      password: ""
    slack:
      enabled: false
      webhook_url: ""
      channel: "#testing"
    webhook:
      enabled: false
      url: ""
      headers: {}

# WebDriver配置
webdriver:
  browser: "chrome"
  headless: true
  window_size: "1920x1080"
  timeout: 30
  implicit_wait: 10
  page_load_timeout: 30
  
  # Selenium特定配置
  selenium:
    chrome_options: ["--no-sandbox", "--disable-dev-shm-usage"]
    firefox_options: []
    driver_path: null
    binary_path: null
  
  # Playwright特定配置
  playwright:
    slow_mo: 0
    user_agent: null
    extra_http_headers: {}
    ignore_https_errors: false

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_handler:
    enabled: true
    filename: "phoenixframe.log"
    max_bytes: 10485760  # 10MB
    backup_count: 5
  console_handler:
    enabled: true
    stream: "stdout"

# 数据库配置
database:
  default:
    driver: "sqlite"
    host: "localhost"
    port: 5432
    database: "phoenixframe.db"
    username: ""
    password: ""
    pool_size: 5
    ssl: false

# 测试配置
testing:
  # 并行执行配置
  parallel_workers: 4
  execution_strategy: "adaptive"
  worker_timeout: 300.0
  task_timeout: 60.0
  
  # 重试配置
  retry_attempts: 3
  retry_delay: 1.0
  
  # 测试数据和输出
  test_data_dir: "tests/data"
  output_dir: "output"
  temp_dir: "temp"
  
  # 截图和视频
  screenshot_on_failure: true
  video_recording: false
  screenshot_dir: "screenshots"
  
  # 资源管理
  resource_cleanup: true
  memory_limit_mb: null
  cpu_limit_percent: null
  
  # 监控和日志
  enable_progress_tracking: true
  enable_resource_monitoring: true
  log_level: "INFO"
  
  # 测试发现
  test_discovery:
    auto_discover: true
    test_patterns: ["test_*.py", "*_test.py"]
    exclude_patterns: ["__pycache__", "*.pyc"]
    max_depth: 5
  
  # 测试分类和标签
  test_categories:
    unit:
      timeout: 30
      parallel: true
    integration:
      timeout: 120
      parallel: true
    ui:
      timeout: 300
      parallel: false
    api:
      timeout: 60
      parallel: true
    performance:
      timeout: 600
      parallel: false

# 安全配置
security:
  encryption_key: null
  mask_sensitive_data: true
  sensitive_fields: ["password", "token", "key", "secret"]

# 性能配置
performance:
  locust:
    host: "http://localhost"
    users: 10
    spawn_rate: 2
    run_time: "1m"
  monitoring:
    enabled: true
    metrics_interval: 5
    memory_threshold: 80
    cpu_threshold: 80

# 可观测性配置
observability:
  tracing:
    enabled: true
    service_name: "phoenixframe"
    jaeger_endpoint: "http://localhost:14268/api/traces"
    sample_rate: 1.0
  metrics:
    enabled: true
    prometheus_port: 8090
    collection_interval: 10